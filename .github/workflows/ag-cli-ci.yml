name: ag-cli ci

on:
  pull_request:
    paths:
      - "pkgs/ag-cli/**"
      - ".github/workflows/ag-cli-ci.yml"
  push:
    paths:
      - "pkgs/ag-cli/**"
      - ".github/workflows/ag-cli-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkgs/ag-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - run: cargo llvm-cov --all-features --all-targets --lcov --output-path lcov.info --fail-under-lines 90
